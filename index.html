<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>동래옥 발주</title>

<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
/* 통합 화면 이동 */
function setActiveScreen(id){
  document.querySelectorAll(".screen").forEach(el=>el.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo({top:0,behavior:"smooth"});
}
function showHome(){ setActiveScreen("homeScreen"); }
function showOrder(){ setActiveScreen("orderScreen"); }
function showSchedule(){ setActiveScreen("scheduleScreen"); renderSchedule(); }

/* 직원 스케줄 */
let scheduleWeekStart = getMonday(new Date());
let scheduleEmployees = [];

function getMonday(date){
  const d=new Date(date);
  const day=d.getDay();
  const diff=d.getDate()-day+(day===0?-6:1);
  d.setDate(diff);
  d.setHours(0,0,0,0);
  return d;
}
function isoDate(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,"0");
  const d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function displayDate(date){
  return `${date.getMonth()+1}/${date.getDate()}`;
}
function weekKey(){ return "dongrae_schedule_"+isoDate(scheduleWeekStart); }
function defaultEmployees(){
  return [
    {name:"직원 1",shifts:["휴무","휴무","휴무","휴무","휴무","휴무","휴무"]},
    {name:"직원 2",shifts:["휴무","휴무","휴무","휴무","휴무","휴무","휴무"]}
  ];
}
function loadSchedule(){
  try{
    const saved=localStorage.getItem(weekKey());
    scheduleEmployees=saved?JSON.parse(saved):defaultEmployees();
    scheduleEmployees.forEach(emp=>{
      emp.shifts=(emp.shifts||[]).map(v=>String(v||"").trim()||"휴무");
      while(emp.shifts.length<7) emp.shifts.push("휴무");
    });
  }catch(e){ scheduleEmployees=defaultEmployees(); }
}
function renderSchedule(){
  loadSchedule();
  const end=new Date(scheduleWeekStart);
  end.setDate(end.getDate()+6);
  document.getElementById("weekLabel").textContent=
    `${scheduleWeekStart.getFullYear()}.${scheduleWeekStart.getMonth()+1}.${scheduleWeekStart.getDate()} - ${end.getMonth()+1}.${end.getDate()}`;

  const days=["월","화","수","목","금","토","일"];
  let head="<tr><th>직원</th>";
  days.forEach((day,i)=>{
    const d=new Date(scheduleWeekStart); d.setDate(d.getDate()+i);
    const cls=i===5?"day-sat":i===6?"day-sun":"";
    head+=`<th class="${cls}">${day}<br><small>${displayDate(d)}</small></th>`;
  });
  head+="</tr>";
  document.getElementById("scheduleHead").innerHTML=head;

  const body=document.getElementById("scheduleBody");
  body.innerHTML="";
  scheduleEmployees.forEach((emp,empIndex)=>{
    const tr=document.createElement("tr");
    let cells=`<td class="employee-cell">
      <input class="employee-name" value="${escapeHtml(emp.name)}" oninput="updateEmployeeName(${empIndex},this.value)">
      <button class="remove-employee" type="button" onclick="removeEmployee(${empIndex})">×</button>
    </td>`;
    for(let day=0;day<7;day++){
      {
        const current=(emp.shifts[day]||"휴무").trim()||"휴무";
        const cls=current==="휴무"?"shift-off":"shift-work";
        cells+=`<td><input class="shift-input ${cls}" value="${escapeHtml(current)}"
          onfocus="this.select()"
          oninput="updateShift(${empIndex},${day},this)"
          onblur="normalizeShift(${empIndex},${day},this)"></td>`;
      }
    }
    tr.innerHTML=cells;
    body.appendChild(tr);
  });
}
function escapeHtml(value){
  return String(value).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function updateEmployeeName(i,value){ scheduleEmployees[i].name=value; markUnsaved(); }
function applyShiftStyle(input){
  const value=input.value.trim();
  input.classList.toggle("shift-off",value===""||value==="휴무");
  input.classList.toggle("shift-work",value!==""&&value!=="휴무");
}
function updateShift(i,d,input){
  const value=input.value.trim();
  scheduleEmployees[i].shifts[d]=value;
  applyShiftStyle(input);
  markUnsaved();
}
function normalizeShift(i,d,input){
  if(input.value.trim()===""){
    input.value="휴무";
    scheduleEmployees[i].shifts[d]="휴무";
  }
  applyShiftStyle(input);
}
function addEmployee(){
  scheduleEmployees.push({name:`직원 ${scheduleEmployees.length+1}`,shifts:["휴무","휴무","휴무","휴무","휴무","휴무","휴무"]});
  renderScheduleWithoutReload();
  markUnsaved();
}
function removeEmployee(i){
  if(!confirm("이 직원을 스케줄표에서 삭제할까요?")) return;
  scheduleEmployees.splice(i,1);
  renderScheduleWithoutReload();
  markUnsaved();
}
function renderScheduleWithoutReload(){
  const temp=scheduleEmployees;
  const end=new Date(scheduleWeekStart); end.setDate(end.getDate()+6);
  document.getElementById("weekLabel").textContent=
    `${scheduleWeekStart.getFullYear()}.${scheduleWeekStart.getMonth()+1}.${scheduleWeekStart.getDate()} - ${end.getMonth()+1}.${end.getDate()}`;
  const days=["월","화","수","목","금","토","일"];
  let head="<tr><th>직원</th>";
  days.forEach((day,i)=>{
    const d=new Date(scheduleWeekStart); d.setDate(d.getDate()+i);
    const cls=i===5?"day-sat":i===6?"day-sun":"";
    head+=`<th class="${cls}">${day}<br><small>${displayDate(d)}</small></th>`;
  });
  head+="</tr>";
  document.getElementById("scheduleHead").innerHTML=head;
  const body=document.getElementById("scheduleBody"); body.innerHTML="";
  temp.forEach((emp,empIndex)=>{
    const tr=document.createElement("tr");
    let cells=`<td class="employee-cell"><input class="employee-name" value="${escapeHtml(emp.name)}" oninput="updateEmployeeName(${empIndex},this.value)"><button class="remove-employee" type="button" onclick="removeEmployee(${empIndex})">×</button></td>`;
    for(let day=0;day<7;day++){
      {
        const current=(emp.shifts[day]||"휴무").trim()||"휴무";
        const cls=current==="휴무"?"shift-off":"shift-work";
        cells+=`<td><input class="shift-input ${cls}" value="${escapeHtml(current)}"
          onfocus="this.select()"
          oninput="updateShift(${empIndex},${day},this)"
          onblur="normalizeShift(${empIndex},${day},this)"></td>`;
      }
    }
    tr.innerHTML=cells; body.appendChild(tr);
  });
}
function copyPreviousWeek(){
  const previous=new Date(scheduleWeekStart);
  previous.setDate(previous.getDate()-7);
  const key="dongrae_schedule_"+isoDate(previous);
  const saved=localStorage.getItem(key);

  if(!saved){
    alert("저번 주에 저장된 스케줄이 없습니다.");
    return;
  }
  if(!confirm("저번 주 직원과 출근/휴무 내용을 이번 주로 그대로 불러올까요?")) return;

  try{
    const copied=JSON.parse(saved);
    scheduleEmployees=copied.map(emp=>({
      name:emp.name||"직원",
      shifts:(emp.shifts||[]).map(v=>String(v||"").trim()||"휴무")
    }));
    scheduleEmployees.forEach(emp=>{
      while(emp.shifts.length<7) emp.shifts.push("휴무");
    });
    renderScheduleWithoutReload();
    markUnsaved();
  }catch(e){
    alert("저번 주 스케줄을 불러오지 못했습니다.");
  }
}

function saveSchedule(){
  localStorage.setItem(weekKey(),JSON.stringify(scheduleEmployees));
  const status=document.getElementById("saveStatus");
  status.textContent="저장 완료";
  setTimeout(()=>status.textContent="",1800);
}
function markUnsaved(){
  document.getElementById("saveStatus").textContent="저장 필요";
}
function moveWeek(delta){
  scheduleWeekStart.setDate(scheduleWeekStart.getDate()+delta*7);
  renderSchedule();
  document.getElementById("saveStatus").textContent="";
}
function clearSchedule(){
  if(!confirm("이번 주 스케줄을 모두 초기화할까요?")) return;
  localStorage.removeItem(weekKey());
  scheduleEmployees=defaultEmployees();
  renderScheduleWithoutReload();
  markUnsaved();
}
function saveScheduleImage(){
  const target=document.getElementById("scheduleCapture");
  html2canvas(target,{backgroundColor:"#ffffff",scale:2}).then(canvas=>{
    const a=document.createElement("a");
    a.download=`동래옥_직원스케줄_${isoDate(scheduleWeekStart)}.png`;
    a.href=canvas.toDataURL("image/png");
    a.click();
  });
}

</script>

<body>

<div class="app-shell">
  <div id="homeScreen" class="screen active">
    <div class="home-card">
      <div class="logo">
        <img src="logo_clean.png" alt="동래옥">
      </div>
      <div class="home-title">동래옥 통합 관리 시스템</div>
      <p class="home-subtitle">원하는 메뉴를 선택하세요.</p>
      <div class="menu-grid">
        <button class="menu-card" type="button" onclick="showOrder()">
          <div class="menu-icon">📦</div>
          <div class="menu-name">발주</div>
          <div class="menu-desc">주방·홀·야채 품목을 선택하고 발주서 이미지를 생성합니다.</div>
        </button>
        <button class="menu-card" type="button" onclick="showSchedule()">
          <div class="menu-icon">📅</div>
          <div class="menu-name">스케줄</div>
          <div class="menu-desc">직원별 주간 근무시간을 작성하고 휴대폰에 저장합니다.</div>
        </button>
      </div>
    </div>
  </div>

<div id="orderScreen" class="screen">
<div class="card">
<button class="home-back" type="button" onclick="showHome()">← 메인 메뉴</button>
  <div class="logo">
    <img src="logo_clean.png" alt="동래옥">
  </div>

  <div class="topbar">
    <div id="pageTitle" class="page-title">주방 발주</div>
    <div class="nav-actions">
      <button id="backBtn" class="nav-btn hidden" type="button" onclick="goKitchen()">← 주방 발주</button>
      <button id="hallBtn" class="nav-btn" type="button" onclick="goHall()">→ 홀 발주</button>
      <button id="vegetableBtn" class="nav-btn" type="button" onclick="goVegetable()">→ 야채 발주</button>
    </div>
  </div>

  <div class="date-row">
    <label for="d">발주 날짜</label>
    <input type="date" id="d">
  </div>

  <div id="items"></div>

  <button class="action-btn" onclick="makeSheet()">발주서 만들기</button>
  <button class="action-btn secondary" onclick="saveImg()">이미지 저장</button>

      <strong id="sheetItemCount">0개</strong>
    </div>

  </div>
</div>

<script>

        rowColor: "group-brown-row",

          ["토종순대","박스"],["백순대","박스"],["찰순대","박스"]
        ]
      },
      {
        name: "기본 조리 품목",

      {

          ["소고기 곰탕","박스"],["소곱창 전골","박스"]
        ]
      },
      {
        name: "김치",
        color: "group-purple",

      },
      {

        ]
      }

  },
  hall: {
    title: "홀 발주",
    sheetTitle: "홀 발주서",
    sections: [
      {
        name: "주류",
        items: [
          ["카스","박스"],["테라","박스"],["참이슬","박스"],["처음처럼","박스"],
          ["진로이즈","박스"],["새로","박스"],["참이슬 오리지날","박스"],["청하","박스"]
        ]
      },
      {
        name: "소스류",
        items: [
          ["참소스","박스"],["돈가스 소스","박스"]
        ]
      },
      {
        name: "홀 메인 품목",
        items: [
          ["종이컵","박스"],["물티슈","박스"],["테이블 냅킨","박스"],["점보롤","박스"],
          ["두루마리 휴지","박스"],["키친타올","박스"],["쌈장","박스"],["단무지","개"],
          ["옥수수 콘샐러드","봉지"],["후추","봉지"],["머스타드","봉지"],["데리야끼","봉지"],
          ["새우젓","통"],["커피믹스","봉지"],["들깨가루","봉지"],["원두커피","봉지"]
        ]
      },
      {

        items: [
          ["두칸실링","박스"],["깍두기용기 (95)","박스"],["소스용기 (70)","박스"],
          ["육수용기 500ml","박스"],["들깨 포장봉지","박스"],["포장봉투(중)","박스"],
          ["포장봉투(소)","박스"],["탕용기","박스"]
        ]
      },
      {
        name: "주방용품",
        items: [
          ["식기세척기 세제","통"],["식기세척기 린스","통"],["초음파 세척세제","통"],
          ["트리오","통"],["라텍스 장갑(대)","박스"],["라텍스 장갑(중)","박스"],
          ["고무장갑(소)","개"],["고무장갑(대)","개"],["크린랩 30X40","개"],
          ["파란봉투 70L","묶음"]
        ]
      }
    ]
  },
  vegetable: {
    title: "야채 발주",
    sheetTitle: "야채 발주서",
    sections: [
      {
        name: "야채·식재료",
        items: [
          ["부추","박스"],["양파","망"],["대파","단"],["숙주","박스"],
          ["청경채","박스"],["팽이버섯","박스"],["청양고추","박스"],["단호박","박스"],
          ["쑥갓","봉지"],["깻잎","봉지"],["마늘","봉지"],["깍두기","박스"],
          ["초장","통"],["고추기름","통"]
        ]
      },
      {
        name: "주류·기타",
        items: [
          ["장수 막걸리","개"],["지평 막걸리","개"],
          ["쓰레기 봉투(75)","묶음"],["담금주","개"]
        ]
      }
    ]
  }
};

let currentPage = "kitchen";
const quantities = { kitchen:{}, hall:{}, vegetable:{} };

function getFlatItems(pageKey){
  const page = pages[pageKey];
  if(page.items) return page.items.map((item,index)=>({item,index,section:null}));
  const result=[];
  page.sections.forEach((section)=>{
    section.items.forEach((item)=>{
      result.push({item,index:result.length,section:section.name});
    });
  });
  return result;
}

function renderPage(){
  const page=pages[currentPage];
  document.getElementById("pageTitle").textContent=page.title;
  document.getElementById("sheetTitle").textContent=page.sheetTitle;

  const back=document.getElementById("backBtn");
  const hall=document.getElementById("hallBtn");
  const vegetable=document.getElementById("vegetableBtn");
  back.classList.toggle("hidden",currentPage==="kitchen");
  hall.classList.toggle("hidden",currentPage==="hall");
  vegetable.classList.toggle("hidden",currentPage==="vegetable");

  const wrap=document.getElementById("items");
  wrap.innerHTML="";

  if(page.items){
    page.items.forEach((item,i)=>wrap.appendChild(createItemRow(item,i)));
  }else{
    let index=0;
    page.sections.forEach(section=>{
      const title=document.createElement("div");
      title.className="section-title" + (section.color ? " " + section.color : "");
      title.textContent=section.name;
      wrap.appendChild(title);
      section.items.forEach(item=>{
        wrap.appendChild(createItemRow(item,index,section.rowColor || ""));
        index++;
      });
    });
  }
}

function createItemRow(item,index,rowColor=""){
  const row=document.createElement("div");
  row.className="item" + (rowColor ? " " + rowColor : "");
  const value=quantities[currentPage][index]||0;
  row.innerHTML=`
    <span class="item-name">${item[0]}</span>
    <div class="controls">
      <button class="circle-btn minus" type="button" onclick="changeQty(${index},-1)">−</button>
      <span class="count" id="count-${currentPage}-${index}">${value}</span>
      <button class="circle-btn plus" type="button" onclick="changeQty(${index},1)">+</button>
    </div>`;
  return row;
}

function changeQty(index,delta){
  const old=quantities[currentPage][index]||0;
  quantities[currentPage][index]=Math.max(0,old+delta);
  document.getElementById(`count-${currentPage}-${index}`).textContent=quantities[currentPage][index];
}

function openPage(pageKey){
  if(currentPage===pageKey) return;
  history.pushState({page:pageKey},"","#"+pageKey);
  currentPage=pageKey;
  renderPage();
  window.scrollTo({top:0,behavior:"smooth"});
}

function goHall(){
  openPage("hall");
}

function goVegetable(){
  openPage("vegetable");
}

function goKitchen(){
  if(currentPage!=="kitchen"){
    history.pushState({page:"kitchen"},"",location.pathname);
    currentPage="kitchen";
    renderPage();
    window.scrollTo({top:0,behavior:"smooth"});
  }
}

window.addEventListener("popstate",(event)=>{
  const page=event.state && pages[event.state.page] ? event.state.page : "kitchen";
  currentPage=page;
  renderPage();
  window.scrollTo({top:0,behavior:"smooth"});
});

function makeSheet(){
  const page=pages[currentPage];
  const flat=getFlatItems(currentPage);
  const list=document.getElementById("list");
  list.innerHTML="";
  document.getElementById("sheetTitle").textContent=page.sheetTitle;

  const rawDate=document.getElementById("d").value;
  const formattedDate=rawDate ? rawDate.replaceAll("-",". ") : "";
  document.getElementById("dateTxt").textContent=formattedDate;

  let lastSection=null;
  let selectedCount=0;

  flat.forEach(({item,index,section})=>{
    const q=quantities[currentPage][index]||0;
    if(q<=0) return;

    selectedCount++;

    if(section && section!==lastSection){
      const heading=document.createElement("div");
      heading.className="sheet-section";

      const colors={
        "머리고기류":"#b23a3a",
        "순대류":"#7a5230",
        "기본 조리 품목":"#b8860b",
        "냉동 육류":"#2e8b57",
        "탕·전골":"#2f6fb3",
        "김치":"#7b57b5",
        "내장류":"#a03d3d",
        "주류":"#2f6fb3",
        "소스류":"#9b6b30",
        "홀 메인 품목":"#2e8b57",
        "포장용기":"#8a5a44",
        "주방용품":"#616161",
        "야채·식재료":"#3d8b52",
        "주류·기타":"#8a5a44"
      };
      heading.style.background=colors[section]||"#7c5140";
      heading.textContent=section;
      list.appendChild(heading);
      lastSection=section;
    }

    const row=document.createElement("div");
    row.className="row";
    row.innerHTML=`<span>${item[0]}</span><b>${q}${item[1]}</b>`;
    list.appendChild(row);
  });

  document.getElementById("sheetItemCount").textContent=selectedCount+"개";

  if(selectedCount===0){
    const empty=document.createElement("div");
    empty.className="sheet-empty";
    empty.textContent="선택된 발주 품목이 없습니다.";
    list.appendChild(empty);
  }
}

function saveImg(){
  makeSheet();
  html2canvas(document.getElementById("sheet"),{backgroundColor:"#ffffff",scale:2}).then(canvas=>{
    const a=document.createElement("a");
    a.download=`동래옥_${pages[currentPage].sheetTitle}.png`;
    a.href=canvas.toDataURL("image/png");
    a.click();
  });
}

document.getElementById("d").value=new Date().toISOString().slice(0,10);
history.replaceState({page:"kitchen"},"",location.pathname);
renderPage();
</script>
</div>
